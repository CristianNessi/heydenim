<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Admin · Heydemin</title>
<link rel="icon" type="image/svg+xml" href="/static/imagen/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/imagen/favicon.png">
<link rel="shortcut icon" href="/static/imagen/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/static/imagen/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
}

/* ── Panel izquierdo: imagen de marca ── */
.login-visual {
    position: relative;
    background:
        linear-gradient(160deg, rgba(17,17,17,0.55) 0%, rgba(17,17,17,0.3) 60%, rgba(193,154,107,0.25) 100%),
        url('https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=900&q=80')
        center / cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 48px;
    overflow: hidden;
}

.login-visual::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(17,17,17,0.7) 0%, transparent 55%);
}

.login-visual__content {
    position: relative;
    z-index: 1;
}

.login-visual__brand {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 12px;
}

.login-visual__tagline {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 400;
}

/* Detalle decorativo */
.login-visual__badge {
    position: absolute;
    top: 40px;
    left: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 99px;
    padding: 8px 16px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
}

.login-visual__badge::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c19a6b;
    flex-shrink: 0;
}

.login-visual__logo {
    display: block;
    width: 200px;
    height: auto;
    filter: brightness(0) invert(1);
    margin-bottom: 12px;
}

/* ── Panel derecho: formulario ── */
.login-panel {
    background: #faf9f7;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
}

.login-form {
    width: 100%;
    max-width: 360px;
}

.login-form__eyebrow {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c19a6b;
    margin-bottom: 10px;
}

.login-form__title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 6px;
    line-height: 1.2;
}

.login-form__sub {
    font-size: 0.84rem;
    color: #888;
    margin-bottom: 36px;
}

.form-group {
    margin-bottom: 18px;
}

.form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #444;
    margin-bottom: 7px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

.form-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e5e2dc;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
    border-color: #111;
    box-shadow: 0 0 0 3px rgba(17,17,17,0.06);
}

.form-input::placeholder { color: #bbb; }

.login-btn {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    border: none;
    background: #111;
    color: #fff;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    font-family: inherit;
}

.login-btn:hover {
    background: #2d2d2d;
    transform: translateY(-1px);
}

.login-btn:active { transform: translateY(0); }

.login-footer {
    margin-top: 28px;
    text-align: center;
    font-size: 0.75rem;
    color: #bbb;
}

.login-footer a {
    color: #888;
    text-decoration: none;
}

.login-footer a:hover { color: #111; }

.login-error {
    display: none;
    align-items: center;
    gap: 8px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 0.82rem;
    font-weight: 500;
    margin-bottom: 14px;
}

.login-error.visible { display: flex; }

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
}

/* ── Responsive ── */
@media (max-width: 768px) {
    body { grid-template-columns: 1fr; }

    .login-visual {
        min-height: 220px;
        padding: 28px 24px;
        justify-content: flex-end;
    }

    .login-visual__brand { font-size: 2rem; }
    .login-visual__badge { top: 20px; left: 24px; }

    .login-panel { padding: 36px 24px; }
    .login-form { max-width: 100%; }
}
</style>
</head>
<body>

<!-- Panel visual izquierdo -->
<div class="login-visual">
    <div class="login-visual__badge">Panel de administración</div>
    <div class="login-visual__content">
        <div style="margin-bottom:14px;">
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:3rem;font-weight:700;color:#fff;line-height:1;letter-spacing:0.01em;">hey</div>
          <div style="font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:600;letter-spacing:0.55em;text-transform:uppercase;color:#c19a6b;margin-top:4px;">denim</div>
        </div>
        <p class="login-visual__tagline">Denim femenino premium</p>
    </div>
</div>

<!-- Panel formulario derecho -->
<div class="login-panel">
    <form class="login-form" method="POST" action="/admin/login">

        <p class="login-form__eyebrow">Bienvenida</p>
        <h1 class="login-form__title">Acceso al panel</h1>
        <p class="login-form__sub">Ingresá tus credenciales para continuar</p>

        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email"
                placeholder="admin@heydemin.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input class="form-input" type="password" id="password" name="password"
                placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="login-error" id="login-error">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="login-error-msg">Credenciales incorrectas. Verificá tu email y contraseña.</span>
        </div>

        <button type="submit" class="login-btn">Ingresar</button>

        <p class="login-footer">
            <a href="/">← Volver a la tienda</a>
        </p>

    </form>
</div>

<script>
// Mostrar error si viene ?error=1 en la URL
(function () {
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
        const el = document.getElementById('login-error');
        const msg = document.getElementById('login-error-msg');
        if (params.get('error') === 'blocked') {
            msg.textContent = 'Demasiados intentos fallidos. Esperá 5 minutos antes de intentar de nuevo.';
        }
        el.classList.add('visible');
        const form = document.querySelector('.login-form');
        form.style.animation = 'shake 0.4s ease';
        form.addEventListener('animationend', () => form.style.animation = '', { once: true });
        if (params.get('error') !== 'blocked') {
            document.getElementById('email').style.borderColor = '#fca5a5';
            document.getElementById('password').style.borderColor = '#fca5a5';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    }
})();
</script>

</body>
</html>
